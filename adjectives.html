<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Adjectives — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  .chip.vchip { font-size:16pt; min-width:60px; }
  .blankmark { letter-spacing:1px; font-weight:bold; }
  /* print-only (parent-graded) helpers */
  .drawbox { height:96px; border:2px dashed #b0b6bd; border-radius:8px; margin:8px 0 4px; }
  .writeline { border-bottom:2px solid var(--ink); height:34px; margin:8px 0; }
  .pbadge { font-family:Verdana,sans-serif; font-size:9pt; font-weight:bold; color:#8a5a00; background:#fff3cd; border:1px solid #ffe08a; border-radius:10px; padding:1px 8px; margin-left:6px; }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>🎨 Adjectives — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Tap the word in the sentence that is the adjective (it describes a noun).">Find <input type="number" id="f-find" min="0" max="12"></label>
      <label data-tip="Tap the adjective that best fits the sentence.">Choose <input type="number" id="f-fit" min="0" max="12"></label>
      <label data-tip="Print-only: the child draws each picture and a grown-up marks it.">Draw ✍️ <input type="number" id="f-draw" min="0" max="6"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Tap the adjective; tap the best adjective. The last section is done on the printout (a grown-up marks it). Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Adjectives</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! 🎨⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";

const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  find: WS.clamp(WS.toInt(WS.Q.get('find'), 4), 0, 12),
  fit:  WS.clamp(WS.toInt(WS.Q.get('fit'),  4), 0, 12),
  draw: WS.clamp(WS.toInt(WS.Q.get('draw'), 3), 0, 6) };

const rng = WS.makeRng(cfg.seed);
const { shuffle } = WS.helpers(rng);

/* ---- Section 1: which word is the adjective? (chip-select, per-item options) ---- */
const FIND = [
  {s:'My mother has long hair.',            opts:['long','mother','hair'],        a:'long'},
  {s:'Syarif is a tall boy.',               opts:['tall','boy','Syarif'],         a:'tall'},
  {s:'Liza loves the juicy watermelon.',    opts:['juicy','loves','watermelon'],  a:'juicy'},
  {s:'Tabitha bakes delicious cookies.',    opts:['delicious','bakes','cookies'], a:'delicious'},
  {s:'Calvin washed his dirty boots.',      opts:['dirty','washed','boots'],      a:'dirty'},
  {s:'There are colourful balloons.',       opts:['colourful','balloons','are'],  a:'colourful'},
  {s:'Kai bought a pretty dress.',          opts:['pretty','bought','dress'],     a:'pretty'},
  {s:'Ming has neat handwriting.',          opts:['neat','handwriting','has'],    a:'neat'},
  {s:'The sad clown cried.',                opts:['sad','clown','cried'],         a:'sad'},
  {s:'Today is a sunny day.',               opts:['sunny','today','day'],         a:'sunny'},
  {s:'This is a heavy bag.',                opts:['heavy','bag','this'],          a:'heavy'},
  {s:'She has a round cake.',               opts:['round','cake','she'],          a:'round'},
];
const findOrder = shuffle(FIND);
function gFind(i){
  const t = findOrder[(i-1) % findOrder.length];
  const opts = shuffle(t.opts.slice());
  const chips = opts.map(o => '<button type="button" class="chip vchip" data-ok="'+(o===t.a?1:0)+'">'+o+'</button>').join('');
  return '<div class="item"><span class="label">'+i+'.</span> Which word is the adjective? <i>'+t.s+'</i>'
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 2: choose the best adjective (chip-select, per-item options) ---- */
const FIT = [
  {s:'Be careful! The coffee is ___.',            opts:['hot','cold','blue'],     a:'hot'},
  {s:'A tortoise is a ___ animal.',               opts:['slow','fast','loud'],    a:'slow'},
  {s:'Jim wins every race. He is a ___ runner.',  opts:['fast','slow','sad'],     a:'fast'},
  {s:'The lemon tastes ___.',                     opts:['sour','sweet','hot'],    a:'sour'},
  {s:'An elephant is very ___.',                  opts:['big','small','tiny'],    a:'big'},
  {s:'Ice feels very ___.',                       opts:['cold','hot','warm'],     a:'cold'},
  {s:'Honey is ___.',                             opts:['sweet','sour','bitter'], a:'sweet'},
  {s:'A giant is very ___.',                      opts:['tall','short','small'],  a:'tall'},
  {s:'A rock is ___.',                            opts:['hard','soft','light'],   a:'hard'},
  {s:'The night sky is ___.',                     opts:['dark','bright','sunny'], a:'dark'},
  {s:'A feather is ___.',                         opts:['light','heavy','hard'],  a:'light'},
  {s:'The tiny ant is very ___.',                 opts:['small','huge','tall'],   a:'small'},
];
const fitOrder = shuffle(FIT);
function gFit(i){
  const t = fitOrder[(i-1) % fitOrder.length];
  const opts = shuffle(t.opts.slice());
  const chips = opts.map(o => '<button type="button" class="chip vchip" data-ok="'+(o===t.a?1:0)+'">'+o+'</button>').join('');
  const sentence = t.s.replace('___', '<span class="blankmark">___</span>');
  return '<div class="item"><span class="label">'+i+'.</span> '+sentence
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 3: draw the picture (PRINT-ONLY, parent-graded — no gradable markup) ---- */
const DRAW = ['a short pencil', 'a big flower', 'a small bag', 'a long worm', 'a round balloon', 'a thick book'];
const drawOrder = shuffle(DRAW);
function gDraw(i){
  const t = drawOrder[(i-1) % drawOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span> Draw <b>'+t+'</b>.'
    + '<div class="drawbox"></div></div>';
}

/* ---- build the sheet ---- */
let html = '';
html += WS.teach('Adjectives',
  'An <b>adjective</b> is a word that describes a noun — it tells us more about it.<br>'
  + 'a <b>big</b> house, a <b>red</b> apple, a <b>sunny</b> day.');
html += WS.section('Which word is the adjective?', cfg.find, gFind);
html += WS.section('Choose the best adjective', cfg.fit, gFit);
html += WS.teach('On paper ✍️', 'Do this last part on the printed sheet — a grown-up marks it.');
html += WS.section('Read and draw the picture', cfg.draw, gDraw);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • adjectives';

/* ---- wiring ---- */
WS.wireChips();
WS.wirePanel(cfg, ['find','fit','draw'], {
  mark:  () => WS.mark(),
  clear: () => WS.clearAll(),
});
</script>
</body>
</html>
