<!DOCTYPE html>
<html lang="en">
<!-- =====================================================================
     Unit 29 — Word Substitutions. Primary One English (VOCABULARY).
     Built from beginning-sounds.html; see specs/word-substitutions.md.
     Two typed-input sections, both the default `text` answer kind:
       • gReplace — sentence with a wordy phrase <u>underlined</u>; child types the one-word substitute
       • gWrite   — a short meaning; child writes the single word it matches
     Each section's helping-word bank is shown in its WS.teach block (print-only reference, no
     gradable markup, ignored by marking + the duplicate scanner).
     ===================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Word Substitutions — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  /* word-substitutions-specific components (topic style stays in the page; shared style is in worksheet.css) */
  .blankline { display:block; margin:8px 0 0 4px; }
  .qrow { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; max-width:560px; margin-top:4px; }
  input.ans { font:inherit; text-align:center; border:none; border-bottom:2px solid var(--ink); background:transparent; color:var(--ink); width:170px; }
  .wordbank { display:flex; flex-wrap:wrap; gap:8px 10px; margin:10px 0 2px; }
  .bword { display:inline-block; font-family:Verdana,sans-serif; font-weight:bold; font-size:12pt; padding:5px 13px; border:2px solid var(--accent); border-radius:20px; background:#fff; color:var(--accent); }
  @media print { .bword { border-color:#000; color:#000; } }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>🔄 Word Substitutions — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number that makes the worksheet. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Read the sentence. Replace the underlined words with one of the helping words.">Replace the words <input type="number" id="f-replace" min="0" max="9"></label>
      <label data-tip="Read the meaning. Write the one word it matches.">Write the word <input type="number" id="f-write" min="0" max="8"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Type the missing word (not case-sensitive). Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Word Substitutions</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! 🔄⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";

/* ---- config: one key per section, each maps 1:1 to a URL param + panel field + generator ---- */
const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  replace: WS.clamp(WS.toInt(WS.Q.get('replace'), 6), 0, 9),
  write:   WS.clamp(WS.toInt(WS.Q.get('write'),   5), 0, 8) };

const rng = WS.makeRng(cfg.seed);
const { shuffle } = WS.helpers(rng);

const bank = words => '<div class="wordbank">' + words.map(w => '<span class="bword">'+w+'</span>').join('') + '</div>';

/* ---- Section 1: replace the underlined words with a helping word (typed input, default `text` kind) ---- */
/* Every sentence + helping word from workbook p.129-130 (9 items — the pool is shuffled and indexed
   by question number, so a count up to 9 always renders 9 distinct sentences). */
const BANK1 = ['yesterday','returned','audience','screamed','annually','neighbours','exit','quiet','alone'];
const REPLACE = [
  { pre:'I am ',                    u:'by myself',                post:' at home.',                   bpre:'I am ',                    bpost:' at home.',                   a:'alone' },
  { pre:'Ally ',                    u:'gave a loud, sharp cry',    post:' and ran away.',              bpre:'Ally ',                    bpost:' and ran away.',              a:'screamed' },
  { pre:'The ',                     u:'way to go out',             post:' of the mall is over there.', bpre:'The ',                     bpost:' of the mall is over there.', a:'exit' },
  { pre:'The ',                     u:'people who watch the show', post:' clapped loudly.',            bpre:'The ',                     bpost:' clapped loudly.',            a:'audience' },
  { pre:'Please ',                  u:'do not make any noise',     post:' in the library.',            bpre:'Please be ',               bpost:' in the library.',            a:'quiet' },
  { pre:'The ',                     u:'people who live next door', post:' are very friendly.',         bpre:'The ',                     bpost:' are very friendly.',         a:'neighbours' },
  { pre:'We celebrate Christmas ',  u:'once a year',               post:'.',                           bpre:'We celebrate Christmas ',  bpost:'.',                           a:'annually' },
  { pre:'We went to the zoo ',      u:'the day before today',      post:'.',                           bpre:'We went to the zoo ',      bpost:'.',                           a:'yesterday' },
  { pre:'My father ',               u:'came back',                 post:' early today.',               bpre:'My father ',               bpost:' early today.',               a:'returned' },
];
const replaceOrder = shuffle(REPLACE);
function gReplace(i){
  const t = replaceOrder[(i-1) % replaceOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span> '
    + t.pre + '<u>' + t.u + '</u>' + t.post
    + '<div class="blankline">' + t.bpre
    + '<input class="ans gradable" data-answer="'+t.a+'" type="text" autocomplete="off">'
    + t.bpost + '</div></div>';
}

/* ---- Section 2: write the word for the meaning (typed input, default `text` kind) ---- */
/* Every meaning + helping word from workbook p.131 (8 items — same distinct-pool technique). */
const BANK2 = ['accompany','shout','whisper','parents','soon','many','behind','entrance'];
const WRITE = [
  { def:'at the back',          a:'behind' },
  { def:'a great number',       a:'many' },
  { def:'to call out loudly',   a:'shout' },
  { def:'father and mother',    a:'parents' },
  { def:'in a very short time', a:'soon' },
  { def:'to speak very softly', a:'whisper' },
  { def:'to go with',           a:'accompany' },
  { def:'a way to enter',       a:'entrance' },
];
const writeOrder = shuffle(WRITE);
function gWrite(i){
  const t = writeOrder[(i-1) % writeOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span>'
    + '<div class="qrow"><span class="def">'+t.def+'</span>'
    + '<span class="field"><input class="ans gradable" data-answer="'+t.a+'" type="text" autocomplete="off"></span></div>'
    + '</div>';
}

/* ---- build the sheet: teach, then practise (each teach block is ignored by marking + verifier) ---- */
let html = '';
html += WS.teach('Word substitutions',
  'We can use <b>one word</b> to substitute (take the place of) a group of words, to make a sentence shorter.<br>'
  + '<span class="ex"><b>I am <u>by myself</u> at home.</b> → I am <b class="sound">alone</b> at home.</span><br>'
  + 'Read each sentence. Replace the <u>underlined words</u> with one of these helping words.'
  + bank(BANK1));
html += WS.section('Replace the underlined words', cfg.replace, gReplace);

html += WS.teach('More word substitutions',
  'A short phrase can often be replaced by <b>one word</b> too.<br>'
  + '<span class="ex"><b>at the back</b> → <b class="sound">behind</b></span><br>'
  + 'Write the one word that matches each meaning. Use these helping words.'
  + bank(BANK2));
html += WS.section('Write the word', cfg.write, gWrite);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • word substitutions';

/* ---- wiring (shared engine) ---- */
WS.wirePanel(cfg, ['replace','write'], {
  mark:  () => WS.mark(),
  clear: () => WS.clearAll(),
});
</script>
</body>
</html>
