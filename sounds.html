<!DOCTYPE html>
<html lang="en">
<!-- =====================================================================
     Unit 23 — Sounds. Primary One English (VOCABULARY).
     Copied from homes.html (the vocab template): the reusable MATCHING widget
     (see simple-past-tense.html / AGENTS.md) + chip-select "choose" sections,
     plus typed-input "fill" sections and a chip-select "riddle" section.
     Source: workbook pages 100-106 (animal sounds + object sounds).
     ===================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sounds — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  .qrow { display:flex; align-items:center; justify-content:flex-start; gap:18px; flex-wrap:wrap; }
  img.pic { width:64px; height:64px; }
  img.obj { width:38px; height:38px; }
  img.riddlepic { width:52px; height:52px; }
  .bubble { display:inline-flex; align-items:center; gap:6px; border:2px solid var(--ink); border-radius:14px; padding:8px 16px; background:#fff; font-size:17pt; }
  input.ans { font:inherit; text-align:center; border:none; border-bottom:2px solid var(--ink); background:transparent; color:var(--ink); width:60px; }
  input.ans.sound { width:120px; }
  input.ans.obj { width:96px; }
  .chip.vchip { font-size:16pt; min-width:60px; }
  .chip.imgchip { border-radius:12px; padding:8px; }
  .blankmark { letter-spacing:1px; font-weight:bold; }
  .clines { display:flex; flex-direction:column; gap:6px; }
  .cline { font-size:17pt; }
  .riddle { background:#f6f8fa; border:1px solid #dbe2ea; border-radius:8px; padding:12px 14px; font-size:16pt; line-height:1.6; margin:8px 0; max-width:440px; }
  .instr { font-family:Verdana,sans-serif; font-size:12pt; color:#555; font-style:italic; margin:4px 0 10px; }
  .wordbank { display:flex; flex-wrap:wrap; gap:8px 26px; background:#fff7e0; border:2px solid #e7c766; border-radius:14px; padding:10px 18px; margin:10px 0; font-weight:bold; }
  .wordbank span { white-space:nowrap; }
  /* matching widget (reusable — see AGENTS.md / homes.html) */
  .match { position:relative; display:flex; justify-content:space-between; gap:90px; max-width:560px; margin:6px 0 10px; }
  .mcol { display:flex; flex-direction:column; gap:16px; z-index:2; }
  .colhead { font-family:Verdana,sans-serif; font-size:10.5pt; font-weight:bold; color:#666; text-align:center; margin-bottom:4px; }
  .mitem { font:inherit; font-size:15pt; padding:8px 14px; border:2.5px solid var(--ink); border-radius:12px; background:#fff; cursor:pointer; min-width:112px; text-align:center; }
  .mitem.msel { background:#fde68a; }
  .mitem.mk-correct { border-color:var(--right); background:#bbf7d0; }
  .mitem.mk-incorrect { border-color:var(--wrong); background:#fecaca; }
  .mlines { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
  @media print { .mitem.mk-correct, .mitem.mk-incorrect { background:#fff; border-color:var(--ink); } }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>🔊 Sounds — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Look at the animal and write the sound it makes.">Animal sounds <input type="number" id="f-fill" min="0" max="8"></label>
      <label data-tip="Tap an animal, then tap the sound it makes.">Match <input type="number" id="f-match" min="0" max="8"></label>
      <label data-tip="Look at the picture and tap the correct words.">Choose the words <input type="number" id="f-choose" min="0" max="8"></label>
      <label data-tip="Read the riddle, then tap the animal it describes.">Animal riddles <input type="number" id="f-riddle" min="0" max="8"></label>
      <label data-tip="Fill in the two words that describe the sound an object makes.">Object sounds <input type="number" id="f-object" min="0" max="6"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Type the sound word (not case-sensitive); tap pictures/words to select. Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Sounds</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! 🔊⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";
const SVGNS = 'http://www.w3.org/2000/svg';

/* ---- config: one key per section, each maps 1:1 to a URL param + panel field + generator ---- */
const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  fill:   WS.clamp(WS.toInt(WS.Q.get('fill'),   5), 0, 8),
  match:  WS.clamp(WS.toInt(WS.Q.get('match'),  6), 0, 8),
  choose: WS.clamp(WS.toInt(WS.Q.get('choose'), 5), 0, 8),
  riddle: WS.clamp(WS.toInt(WS.Q.get('riddle'), 5), 0, 8),
  object: WS.clamp(WS.toInt(WS.Q.get('object'), 4), 0, 6) };

const rng = WS.makeRng(cfg.seed);
const { shuffle } = WS.helpers(rng);

/* ---- picture vocabulary (Twemoji, bundled offline under assets/twemoji/) ---- */
const TW   = cp => 'assets/twemoji/' + cp + '.svg';
const img  = cp => '<img class="obj" src="' + TW(cp) + '" alt="">';                          // small inline icon (teach examples)
const pic  = (cp, alt) => '<img class="pic" src="' + TW(cp) + '" alt="' + (alt||'') + '">';   // big per-item picture
const rpic = (cp, alt) => '<img class="riddlepic" src="' + TW(cp) + '" alt="' + (alt||'') + '">'; // riddle answer-chip picture

function bank(words){ return '<div class="wordbank">' + words.map(w => '<span>'+w+'</span>').join('') + '</div>'; }

/* ---- Section 1: what sound does each animal make? (typed input, word bank) ---- */
/* page 100 — word bank: bark, squeak, croak, snort, crow, roar, chatter, quack */
const FILL = [
  {cp:'1f986', animal:'duck',    sound:'quack'},
  {cp:'1f413', animal:'rooster', sound:'crow'},
  {cp:'1f438', animal:'frog',    sound:'croak'},
  {cp:'1f437', animal:'pig',     sound:'snort'},
  {cp:'1f435', animal:'monkey',  sound:'chatter'},
  {cp:'1f42d', animal:'mouse',   sound:'squeak'},
  {cp:'1f981', animal:'lion',    sound:'roar'},
  {cp:'1f436', animal:'dog',     sound:'bark'},
];
const fillOrder = shuffle(FILL);
function gFill(i){
  const t = fillOrder[(i-1) % fillOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span>'
    + '<div class="qrow">' + pic(t.cp, t.animal)
    + '<span class="bubble">I <input class="ans sound gradable" data-answer="'+t.sound+'" type="text" autocomplete="off">.</span>'
    + '</div></div>';
}

/* ---- Section 2: matching widget (reusable — see AGENTS.md) ---- */
/* page 101 — PAIRS: {v: animal, p: sound verb}. Text-only, exactly as printed. */
const PAIRS = [
  {v:'pig',   p:'grunts'},  {v:'horse', p:'neighs'}, {v:'cat',   p:'mews'},   {v:'frog',  p:'croaks'},
  {v:'mouse', p:'squeaks'}, {v:'owl',   p:'hoots'},  {v:'snake', p:'hisses'}, {v:'bee',   p:'buzzes'},
];
const MATCH_HEADS = ['Animal', 'Sound'];
function buildMatch(count){
  if (count <= 0) return '';
  const chosen = shuffle(PAIRS).slice(0, count);
  const rights = shuffle(chosen.map(c => c.p));
  const leftHtml = chosen.map(c => '<button type="button" class="mitem mleft" data-answer="'+c.p+'">'+c.v+'</button>').join('');
  const rightHtml = rights.map(p => '<button type="button" class="mitem mright" data-val="'+p+'">'+p+'</button>').join('');
  return '<h2>Match the animal to the sound it makes</h2>'
    + '<div id="sec-match" class="match"><svg class="mlines"></svg>'
    + '<div class="mcol"><div class="colhead">'+MATCH_HEADS[0]+'</div>'+leftHtml+'</div>'
    + '<div class="mcol"><div class="colhead">'+MATCH_HEADS[1]+'</div>'+rightHtml+'</div></div>';
}
function lineColor(l){ return l.classList.contains('mk-correct') ? 'var(--right)' : l.classList.contains('mk-incorrect') ? 'var(--wrong)' : 'var(--accent)'; }
function drawMatch(m){
  const svg = m.querySelector('.mlines'); svg.innerHTML = '';
  const box = m.getBoundingClientRect();
  m.querySelectorAll('.mleft').forEach(l => {
    if (!l.dataset.conn) return;
    const r = [...m.querySelectorAll('.mright')].find(e => e.dataset.val === l.dataset.conn);
    if (!r) return;
    const lr = l.getBoundingClientRect(), rr = r.getBoundingClientRect();
    const line = document.createElementNS(SVGNS, 'line');
    line.setAttribute('x1', lr.right - box.left); line.setAttribute('y1', lr.top + lr.height/2 - box.top);
    line.setAttribute('x2', rr.left - box.left);  line.setAttribute('y2', rr.top + rr.height/2 - box.top);
    line.setAttribute('stroke', lineColor(l)); line.setAttribute('stroke-width', '4'); line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  });
}
function wireMatch(){
  document.querySelectorAll('.match').forEach(m => {
    let sel = null;
    m.querySelectorAll('.mleft').forEach(l => l.addEventListener('click', () => {
      m.querySelectorAll('.mleft').forEach(x => x.classList.remove('msel')); sel = l; l.classList.add('msel');
    }));
    m.querySelectorAll('.mright').forEach(r => r.addEventListener('click', () => {
      if (!sel) return;
      sel.dataset.conn = r.dataset.val; sel.classList.remove('msel','mk-correct','mk-incorrect'); r.classList.remove('mk-correct','mk-incorrect');
      sel = null; drawMatch(m);
    }));
  });
  window.addEventListener('resize', () => document.querySelectorAll('.match').forEach(drawMatch));
}
function resetMatch(){
  document.querySelectorAll('.match .mleft').forEach(l => { delete l.dataset.conn; l.classList.remove('msel','mk-correct','mk-incorrect'); });
  document.querySelectorAll('.match .mright').forEach(r => r.classList.remove('mk-correct','mk-incorrect'));
  document.querySelectorAll('.match .mlines').forEach(s => s.innerHTML = '');
}
function markMatch(){ let total = 0, right = 0;
  document.querySelectorAll('#sec-match').forEach(m => {
    m.querySelectorAll('.mleft').forEach(l => { total++;
      const ok = l.dataset.conn === l.dataset.answer;
      l.classList.remove('mk-correct','mk-incorrect'); l.classList.add(ok ? 'mk-correct' : 'mk-incorrect');
      const r = [...m.querySelectorAll('.mright')].find(e => e.dataset.val === l.dataset.conn);
      if (r) { r.classList.remove('mk-correct','mk-incorrect'); r.classList.add(ok ? 'mk-correct' : 'mk-incorrect'); }
      if (ok) right++;
    });
    drawMatch(m);
  });
  return { total, right };
}
window.__wsAutoSolve = function(){
  document.querySelectorAll('.match .mleft').forEach(l => { l.dataset.conn = l.dataset.answer; });
  document.querySelectorAll('.match').forEach(drawMatch);
};

/* ---- Section 3: choose the correct words (chip-select one, TWO blanks per item) ---- */
/* pages 102-103 — each item names the pictured animal, then its sound; bracket options reproduced verbatim. */
const CHOOSE = [
  {cp:'1f986', name:'duck',     nOpts:['hen','bird','duck'],       sound:'quacks',   sOpts:['clucks','mews','quacks']},
  {cp:'1f436', name:'dog',      nOpts:['cat','dog','horse'],       sound:'barks',    sOpts:['mews','barks','neighs']},
  {cp:'1f426', name:'bird',     nOpts:['snake','bee','bird'],      sound:'sings',    sOpts:['sings','buzzes','moos']},
  {cp:'1f42e', name:'cow',      nOpts:['horse','cow','lion'],      sound:'moos',     sOpts:['moos','barks','quacks']},
  {cp:'1f414', name:'hen',      nOpts:['pig','hen','cow'],         sound:'clucks',   sOpts:['clucks','bleats','hisses']},
  {cp:'1f981', name:'lion',     nOpts:['lion','tiger','wolf'],     sound:'roars',    sOpts:['sings','hisses','roars']},
  {cp:'1f418', name:'elephant', nOpts:['elephant','pig','monkey'], sound:'trumpets', sOpts:['buzzes','chatters','trumpets'], article:'a/an'},
  {cp:'1f411', name:'sheep',    nOpts:['cow','sheep','donkey'],    sound:'bleats',   sOpts:['bleats','moos','neighs']},
];
const chooseOrder = shuffle(CHOOSE);
function gChoose(i){
  const t = chooseOrder[(i-1) % chooseOrder.length];
  const nOpts = shuffle(t.nOpts.slice());
  const sOpts = shuffle(t.sOpts.slice());
  const nChips = nOpts.map(o => '<button type="button" class="chip vchip" data-ok="'+(o===t.name?1:0)+'">'+o+'</button>').join('');
  const sChips = sOpts.map(o => '<button type="button" class="chip vchip" data-ok="'+(o===t.sound?1:0)+'">'+o+'</button>').join('');
  const art = t.article || 'a';
  return '<div class="item"><span class="label">'+i+'.</span>'
    + '<div class="qrow">' + pic(t.cp, t.name)
    + '<div class="clines">'
    +   '<div class="cline">This is '+art+'<span class="blankmark"> ___</span>.</div>'
    +   '<div class="sel-block" data-mode="one"><div class="chips">'+nChips+'</div></div>'
    +   '<div class="cline">It<span class="blankmark"> ___</span>.</div>'
    +   '<div class="sel-block" data-mode="one"><div class="chips">'+sChips+'</div></div>'
    + '</div></div></div>';
}

/* ---- Section 4: animal riddles (chip-select one, riddle text -> pick the animal picture) ---- */
/* pages 104-105 — riddle wording reproduced verbatim from the workbook cards. */
const RIDDLES = [
  {cp:'1f986', animal:'duck',  text:'It can swim.<br>It says, "Quack, quack!"<br>What is it?'},
  {cp:'1f41d', animal:'bee',   text:'It is always busy.<br>It flies from flower to flower.<br>It buzzes.<br>What is it?'},
  {cp:'1f437', animal:'pig',   text:'This animal likes to eat.<br>It grunts, "Oink, oink!"<br>What is it?'},
  {cp:'1f981', animal:'lion',  text:'This is a fierce animal.<br>It roars.<br>It has a mane.<br>What is it?'},
  {cp:'1f42e', animal:'cow',   text:'It eats grass.<br>It gives us milk.<br>It says, "Moo!"<br>What is it?'},
  {cp:'1f431', animal:'cat',   text:'It is small and furry.<br>It mews.<br>What is it?'},
  {cp:'1f414', animal:'hen',   text:'It has feathers.<br>It lays eggs.<br>It says, "Cluck!"<br>What is it?'},
  {cp:'1f434', animal:'horse', text:'You can ride on this animal.<br>It neighs.<br>It lives in a stable.<br>What is it?'},
];
const riddleOrder = shuffle(RIDDLES);
function gRiddle(i){
  const t = riddleOrder[(i-1) % riddleOrder.length];
  const distractors = shuffle(RIDDLES.filter(r => r.animal !== t.animal)).slice(0, 2);
  const opts = shuffle([{r:t, ok:true}, ...distractors.map(d => ({r:d, ok:false}))]);
  const chips = opts.map(o => '<button type="button" class="chip imgchip" data-ok="'+(o.ok?1:0)+'">'+rpic(o.r.cp, o.r.animal)+'</button>').join('');
  return '<div class="item"><span class="label">'+i+'.</span> Read the riddle. Tap the animal.'
    + '<div class="riddle">'+t.text+'</div>'
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 5: what sound does each object make? (typed input, TWO blanks per item, word bank) ---- */
/* page 106 — word bank: pitter patter, choo choo, tick tock, jingle jangle, zoom zoom, ding dong */
const OBJECT = [
  {pre:'My coins go ',           sep:' ',   suf:' in my pocket.',                                   w1:'jingle', w2:'jangle'},
  {pre:'',                       sep:', ',  suf:' goes the aeroplane.',                              w1:'zoom',   w2:'zoom'},
  {pre:'',                       sep:', ',  suf:' goes the train. It is leaving the station.',       w1:'choo',   w2:'choo'},
  {pre:'My little clock goes ',  sep:', ',  suf:' all day long.',                                    w1:'tick',   w2:'tock'},
  {pre:'',                       sep:', ',  suf:'! Someone is at the door.',                          w1:'ding',   w2:'dong'},
  {pre:'Raindrops ',             sep:' - ', suf:' on my windowpane.',                                 w1:'pitter', w2:'patter'},
];
const objectOrder = shuffle(OBJECT);
function gObject(i){
  const t = objectOrder[(i-1) % objectOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span> '+t.pre
    + '<input class="ans obj gradable" data-answer="'+t.w1+'" type="text" autocomplete="off">'
    + t.sep
    + '<input class="ans obj gradable" data-answer="'+t.w2+'" type="text" autocomplete="off">'
    + t.suf
    + '</div>';
}

/* ---- build the sheet: teach, then practise (each teach block is ignored by marking + verifier) ---- */
let html = '';
html += WS.teach('Animal sounds',
  'Different animals make different sounds. Words have been given to describe these sounds.<br>'
  + 'What sounds do these animals make? Fill in the blanks with these helping words.'
  + bank(['bark','squeak','croak','snort','crow','roar','chatter','quack'])
  + '<span class="ex">'+img('1f986')+' <b>duck</b> → I <span class="sound">quack</span>.</span>');
html += WS.section('What sound does each animal make?', cfg.fill, gFill);

html += buildMatch(cfg.match);

html += '<p class="instr">Look at the pictures. Choose the correct words to fill in the blanks.</p>';
html += WS.section('Choose the correct words', cfg.choose, gChoose);

html += '<p class="instr">Read the animal riddles. Then tap the animal each riddle describes.</p>';
html += WS.section('Read the animal riddles', cfg.riddle, gRiddle);

html += WS.teach('Sounds made by objects',
  'Sounds made by objects can also be described.<br>'
  + 'Fill in the blanks with these helping words.'
  + bank(['pitter patter','choo choo','tick tock','jingle jangle','zoom zoom','ding dong']));
html += WS.section('What sound does each object make?', cfg.object, gObject);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • sounds';

/* ---- wiring (shared engine) ---- */
wireMatch();
WS.wireChips();
WS.wirePanel(cfg, ['fill','match','choose','riddle','object'], {
  mark:  () => WS.mark({ extras: [markMatch] }),
  clear: () => WS.clearAll(resetMatch),
});
</script>
</body>
</html>
