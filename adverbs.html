<!DOCTYPE html>
<html lang="en">
<!-- =====================================================================
     Unit 15 — Adverbs. Primary One English.
     Built from beginning-sounds.html; see specs/adverbs.md.
     Sections: add -ly (typed) · choose the adverb (chip) ·
     make a sentence (PRINT-ONLY, parent-graded — see AGENTS.md).

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Adverbs — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  input.ans { font:inherit; text-align:center; border:none; border-bottom:2px solid var(--ink); background:transparent; color:var(--ink); width:130px; }
  .chip.vchip { font-size:16pt; min-width:60px; }
  .blankmark { letter-spacing:1px; font-weight:bold; }
  .writeline { border-bottom:2px solid var(--ink); height:34px; margin:8px 0; }
  .pbadge { font-family:Verdana,sans-serif; font-size:9pt; font-weight:bold; color:#8a5a00; background:#fff3cd; border:1px solid #ffe08a; border-radius:10px; padding:1px 8px; margin-left:6px; }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>🏃 Adverbs — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Add -ly to the word to make an adverb.">Add -ly <input type="number" id="f-makely" min="0" max="12"></label>
      <label data-tip="Tap the adverb that best fits the sentence.">Choose <input type="number" id="f-choose" min="0" max="8"></label>
      <label data-tip="Print-only: the child writes a sentence and a grown-up marks it.">Sentence ✍️ <input type="number" id="f-sentence" min="0" max="6"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Type the -ly adverb; tap the best adverb. The last section is written on the printout (a grown-up marks it). Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Adverbs</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! 🏃⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";

const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  makely:   WS.clamp(WS.toInt(WS.Q.get('makely'),   4), 0, 12),
  choose:   WS.clamp(WS.toInt(WS.Q.get('choose'),   4), 0, 8),
  sentence: WS.clamp(WS.toInt(WS.Q.get('sentence'), 3), 0, 6) };

const rng = WS.makeRng(cfg.seed);
const { shuffle } = WS.helpers(rng);

/* ---- Section 1: add -ly to make an adverb (typed input, default `text` kind) ---- */
const MAKELY = [
  {base:'quick',ly:'quickly'},{base:'slow',ly:'slowly'},{base:'sad',ly:'sadly'},{base:'loud',ly:'loudly'},
  {base:'quiet',ly:'quietly'},{base:'soft',ly:'softly'},{base:'neat',ly:'neatly'},{base:'kind',ly:'kindly'},
  {base:'brave',ly:'bravely'},{base:'bad',ly:'badly'},{base:'happy',ly:'happily'},{base:'easy',ly:'easily'},
  {base:'angry',ly:'angrily'},{base:'noisy',ly:'noisily'},{base:'gentle',ly:'gently'},{base:'careful',ly:'carefully'},
];
const makelyOrder = shuffle(MAKELY);
function gMakely(i){
  const t = makelyOrder[(i-1) % makelyOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span> Add <b>-ly</b>:  <b>'+t.base+'</b>  &rarr;  '
    + '<input class="ans gradable" data-answer="'+t.ly+'" type="text" autocomplete="off"></div>';
}

/* ---- Section 2: choose the adverb (chip-select, per-item options) ---- */
const CHOOSE = [
  {s:'The turtle moves ___.',        opts:['slowly','quickly','loudly'],      a:'slowly'},
  {s:'The cheetah runs ___.',        opts:['quickly','slowly','softly'],      a:'quickly'},
  {s:'She whispered ___.',           opts:['softly','loudly','angrily'],      a:'softly'},
  {s:'He shouted ___.',              opts:['loudly','quietly','softly'],      a:'loudly'},
  {s:'The baby slept ___.',          opts:['peacefully','noisily','angrily'], a:'peacefully'},
  {s:'The children laughed ___.',    opts:['happily','sadly','angrily'],      a:'happily'},
  {s:'He wrote his name ___.',       opts:['neatly','messily','badly'],       a:'neatly'},
  {s:'The lion roared ___.',         opts:['fiercely','gently','softly'],     a:'fiercely'},
];
const chooseOrder = shuffle(CHOOSE);
function gChoose(i){
  const t = chooseOrder[(i-1) % chooseOrder.length];
  const opts = shuffle(t.opts.slice());
  const chips = opts.map(o => '<button type="button" class="chip vchip" data-ok="'+(o===t.a?1:0)+'">'+o+'</button>').join('');
  const sentence = t.s.replace('___', '<span class="blankmark">___</span>');
  return '<div class="item"><span class="label">'+i+'.</span> '+sentence
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 3: make a sentence (PRINT-ONLY, parent-graded — no gradable markup) ---- */
const SENT = ['happily', 'quickly', 'loudly', 'carefully', 'slowly', 'kindly'];
const sentOrder = shuffle(SENT);
function gSent(i){
  const t = sentOrder[(i-1) % sentOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span> Make a sentence using <b>'+t+'</b>.'
    + '<div class="writeline"></div></div>';
}

/* ---- build the sheet ---- */
let html = '';
html += WS.teach('Adverbs',
  'An <b>adverb</b> tells us <b>how</b> something is done. Many adverbs end in <b>-ly</b>.<br>'
  + 'He runs <b>quickly</b>. She sings <b>sweetly</b>.');
html += WS.section('Add -ly to make an adverb', cfg.makely, gMakely);
html += WS.section('Choose the best adverb', cfg.choose, gChoose);
html += WS.teach('On paper ✍️', 'Do this last part on the printed sheet — a grown-up marks it.');
html += WS.section('Make a sentence', cfg.sentence, gSent);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • adverbs';

/* ---- wiring ---- */
WS.wireChips();
WS.wirePanel(cfg, ['makely','choose','sentence'], {
  mark:  () => WS.mark(),
  clear: () => WS.clearAll(),
});
</script>
</body>
</html>
