<!DOCTYPE html>
<html lang="en">
<!-- =====================================================================
     Unit 26 — Country, People and Language (Primary One English, VOCABULARY).
     Built from beginning-sounds.html; see specs/country-people-language.md.
     Three sections: fill in the blanks (country -> people, typed) ·
     choose the country (people/language clue -> country, chip-select one) ·
     circle the country & underline the language (annotation widget, reused
     from common-proper-nouns.html: pick a tool, tap words to mark them).
     ===================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Country, People and Language — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  input.ans { font:inherit; text-align:center; border:none; border-bottom:2px solid var(--ink); background:transparent; color:var(--ink); width:60px; }
  input.ans.word { width:190px; }
  .chip.wordchip { font-size:16pt; }
  /* annotation widget (section 3) — pick a tool, tap words to circle/underline (see common-proper-nouns.html) */
  .atools { display:flex; gap:8px; margin:6px 0 12px; flex-wrap:wrap; }
  .atool { font-family:Verdana,sans-serif; font-size:11pt; padding:5px 12px; border:2px solid #888; border-radius:8px; background:#fff; cursor:pointer; font-weight:bold; }
  .atool.active { background:#dbeafe; border-color:var(--accent); }
  .awords { line-height:2.4; }
  .aword { display:inline-block; padding:2px 7px; margin:3px 3px; font-size:16pt; cursor:pointer; border:2px solid transparent; position:relative; }
  .aword.mk-circle { border:2.5px solid #1d4ed8; border-radius:50%; }
  .aword.mk-underline { border-bottom:3px solid #1d4ed8; }
  .aword.correct { background:#bbf7d0; } .aword.incorrect { background:#fecaca; }
  @media print { .aword.correct, .aword.incorrect { background:#fff; } }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>🌏 Country, People and Language — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Read the country, then write what its people are called.">Fill blanks <input type="number" id="f-people" min="0" max="10"></label>
      <label data-tip="Read the clue about the people or the language, then tap the correct country.">Choose country <input type="number" id="f-country" min="0" max="10"></label>
      <label data-tip="Pick a tool, then tap words: circle each country, underline each language.">Circle &amp; underline <input type="number" id="f-find" min="0" max="8"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Type the missing word (not case-sensitive); tap the correct country; pick a tool and tap words to circle/underline. Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Country, People and Language</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! 🌏⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";

/* ---- config: one key per section (URL param + panel field + count + generator) ---- */
const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  people:  WS.clamp(WS.toInt(WS.Q.get('people'),  4), 0, 10),
  country: WS.clamp(WS.toInt(WS.Q.get('country'), 4), 0, 10),
  find:    WS.clamp(WS.toInt(WS.Q.get('find'),    3), 0, 8) };

const rng = WS.makeRng(cfg.seed);
const { randInt, pick, shuffle, distinct, balanced } = WS.helpers(rng);

/* ---- country facts: country -> what its people are called -> a language spoken there.
   `lang` is kept unique per country within this pool so the "choose the country" section
   never offers two plausible-correct chips for the same clue. ---- */
const COUNTRIES = [
  {country:'Singapore',   people:'Singaporeans', lang:'Tamil'},
  {country:'Malaysia',    people:'Malaysians',   lang:'Malay'},
  {country:'Thailand',    people:'Thais',        lang:'Thai'},
  {country:'Philippines', people:'Filipinos',    lang:'Filipino', article:true},
  {country:'Vietnam',     people:'Vietnamese',   lang:'Vietnamese'},
  {country:'France',      people:'French',       lang:'French'},
  {country:'Indonesia',   people:'Indonesians',  lang:'Indonesian'},
  {country:'Australia',   people:'Australians',  lang:'English'},
  {country:'China',       people:'Chinese',      lang:'Mandarin'},
  {country:'India',       people:'Indians',      lang:'Hindi'},
  {country:'Japan',       people:'Japanese',     lang:'Japanese'},
];

/* ---- Section 1: fill in the blanks (typed input, default `text` kind) ---- */
/* Country shown as the given fact; distinct COUNTRY per question via a shuffled pool. */
const peopleOrder = shuffle(COUNTRIES);
function gPeople(i){
  const c = peopleOrder[(i-1) % peopleOrder.length];
  const shown = (c.article ? 'the ' : '') + '<b>' + c.country + '</b>';
  return '<div class="item"><span class="label">'+i+'.</span> This is the flag of ' + shown + '. The people living in the country are called '
    + '<input class="ans word gradable" data-answer="'+c.people+'" type="text" autocomplete="off">.</div>';
}

/* ---- Section 2: choose the country (chip-select, one answer) ---- */
/* Distinct COUNTRY per question via a separately shuffled pool; the clue alternates, via
   `balanced`, between a people-fact and a language-fact so both appear across the section. */
const countryOrder = shuffle(COUNTRIES);
const countryNames = COUNTRIES.map(c => c.country);
const clueVariant = balanced(['people', 'lang']);
function gCountry(i){
  const c = countryOrder[(i-1) % countryOrder.length];
  const clue = clueVariant(i) === 'lang'
    ? 'The people here speak <b>' + c.lang + '</b>.'
    : 'The people here are called <b>' + c.people + '</b>.';
  const distractors = shuffle(countryNames.filter(n => n !== c.country)).slice(0, 2);
  const opts = shuffle([{n:c.country, ok:true}, ...distractors.map(n => ({n, ok:false}))]);
  const chips = opts.map(o => '<button type="button" class="chip wordchip" data-ok="'+(o.ok?1:0)+'">'+o.n+'</button>').join('');
  return '<div class="item"><span class="label">'+i+'.</span> ' + clue + ' Which country is this?'
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 3: circle the country, underline the language (annotation widget) ----
   Reused from common-proper-nouns.html: a toolbar of two fixed tools + tappable word spans
   (data-type: country | language | none). Plain punctuation tokens ({p:'.'}) render as inert
   text between clauses, never wrapped in a clickable/gradable .aword. The first six sentences
   are the workbook's own "friends" (Ella, Budi, David, Li Na, Arjun, Aiko); five more (same
   style) extend the pool so higher counts stay distinct. */
const FIND = [
  [ {t:'Ella',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'France',type:'country'},{p:'.'},
    {t:'She',type:'none'},{t:'speaks',type:'none'},{t:'French',type:'language'},{t:'and',type:'none'},{t:'English',type:'language'},{p:'.'} ],
  [ {t:'Budi',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'Indonesia',type:'country'},{p:'.'},
    {t:'He',type:'none'},{t:'speaks',type:'none'},{t:'Indonesian',type:'language'},{p:'.'} ],
  [ {t:'David',type:'none'},{t:'comes',type:'none'},{t:'from',type:'none'},{t:'Australia',type:'country'},{p:'.'},
    {t:'He',type:'none'},{t:'speaks',type:'none'},{t:'English',type:'language'},{t:'and',type:'none'},{t:'he',type:'none'},{t:'loves',type:'none'},{t:'to',type:'none'},{t:'watch',type:'none'},{t:'cartoons',type:'none'},{p:'.'} ],
  [ {t:'Li',type:'none'},{t:'Na',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'China',type:'country'},{p:'.'},
    {t:'She',type:'none'},{t:'speaks',type:'none'},{t:'Mandarin',type:'language'},{p:'.'},
    {t:'She',type:'none'},{t:'is',type:'none'},{t:'now',type:'none'},{t:'learning',type:'none'},{t:'to',type:'none'},{t:'speak',type:'none'},{t:'English',type:'language'},{p:'.'} ],
  [ {t:'Arjun',type:'none'},{t:'comes',type:'none'},{t:'from',type:'none'},{t:'India',type:'country'},{p:'.'},
    {t:'He',type:'none'},{t:'speaks',type:'none'},{t:'Hindi',type:'language'},{p:'.'},
    {t:'His',type:'none'},{t:'mummy',type:'none'},{t:'bakes',type:'none'},{t:'flatbread',type:'none'},{t:'for',type:'none'},{t:'us',type:'none'},{p:'!'} ],
  [ {t:'Aiko',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'Japan',type:'country'},{p:'.'},
    {t:'She',type:'none'},{t:'speaks',type:'none'},{t:'Japanese',type:'language'},{p:'.'},
    {t:'She',type:'none'},{t:'wears',type:'none'},{t:'a',type:'none'},{t:'kimono',type:'none'},{t:'when',type:'none'},{t:'we',type:'none'},{t:'celebrate',type:'none'},{t:'Racial',type:'none'},{t:'Harmony',type:'none'},{t:'Day',type:'none'},{p:'.'} ],
  [ {t:'Wei',type:'none'},{t:'Jie',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'Singapore',type:'country'},{p:'.'},
    {t:'He',type:'none'},{t:'speaks',type:'none'},{t:'English',type:'language'},{t:'and',type:'none'},{t:'Malay',type:'language'},{p:'.'} ],
  [ {t:'Iman',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'Malaysia',type:'country'},{p:'.'},
    {t:'She',type:'none'},{t:'speaks',type:'none'},{t:'Malay',type:'language'},{p:'.'} ],
  [ {t:'Nok',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'Thailand',type:'country'},{p:'.'},
    {t:'She',type:'none'},{t:'speaks',type:'none'},{t:'Thai',type:'language'},{p:'.'} ],
  [ {t:'Marco',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'the',type:'none'},{t:'Philippines',type:'country'},{p:'.'},
    {t:'He',type:'none'},{t:'speaks',type:'none'},{t:'Filipino',type:'language'},{p:'.'} ],
  [ {t:'Mai',type:'none'},{t:'is',type:'none'},{t:'from',type:'none'},{t:'Vietnam',type:'country'},{p:'.'},
    {t:'She',type:'none'},{t:'speaks',type:'none'},{t:'Vietnamese',type:'language'},{p:'.'} ],
];
function findWords(tokens){
  let out = '';
  tokens.forEach((tok, idx) => {
    const isPunct = !!tok.p;
    if (idx > 0 && !isPunct) out += ' ';
    out += isPunct ? ('<span class="punct">'+tok.p+'</span>')
                   : ('<span class="aword" data-type="'+tok.type+'">'+tok.t+'</span>');
  });
  return '<span class="awords">' + out + '</span>';
}
function toolbar(){
  return '<div class="atools no-print">'
    + '<button type="button" class="atool" data-mark="circle">⭕ circle (country)</button>'
    + '<button type="button" class="atool" data-mark="underline">＿ underline (language)</button></div>';
}
function applyMarkClass(w){
  w.classList.remove('mk-circle','mk-underline');
  if (w.dataset.mark) w.classList.add('mk-' + w.dataset.mark);
}
function expectedMark(w){
  const t = w.dataset.type;
  return t === 'country' ? 'circle' : (t === 'language' ? 'underline' : '');
}
function wireAnnot(){
  document.querySelectorAll('.annot').forEach(a => {
    const tools = a.querySelectorAll('.atool');
    if (!tools.length) return;
    let active = tools[0].dataset.mark; tools[0].classList.add('active');
    tools.forEach(btn => btn.addEventListener('click', () => {
      active = btn.dataset.mark; tools.forEach(b => b.classList.toggle('active', b === btn));
    }));
    a.querySelectorAll('.aword').forEach(w => w.addEventListener('click', () => {
      w.dataset.mark = (w.dataset.mark || '') === active ? '' : active;
      applyMarkClass(w);
    }));
  });
}
function resetAnnotations(){
  document.querySelectorAll('#sec-find .aword').forEach(w => { w.dataset.mark = ''; w.classList.remove('mk-circle','mk-underline','correct','incorrect'); });
}
window.__wsAutoSolve = function(){
  document.querySelectorAll('#sec-find .aword').forEach(w => { w.dataset.mark = expectedMark(w); applyMarkClass(w); });
};
function markFind(){ let total = 0, right = 0;
  document.querySelectorAll('#sec-find .item').forEach(row => { total++; let ok = true;
    row.querySelectorAll('.aword').forEach(w => { const good = (w.dataset.mark || '') === expectedMark(w);
      w.classList.remove('correct','incorrect'); w.classList.add(good ? 'correct' : 'incorrect'); if (!good) ok = false; });
    if (ok) right++; });
  return { total, right };
}
function buildFind(count){
  if (count <= 0) return '';
  const chosen = shuffle(FIND).slice(0, count);          // distinct sentences, drawn without replacement
  const rows = chosen.map((sent, k) => '<div class="item"><span class="label">'+(k+1)+'.</span> ' + findWords(sent) + '</div>').join('');
  return '<h2>Circle the country, underline the language</h2>'
    + '<div id="sec-find" class="annot">' + toolbar() + rows + '</div>';
}

/* ---- build the sheet: teach, then practise (order = pedagogical 1 -> 3) ---- */
let html = '';
html += WS.teach('Country, people and language',
  'People in different parts of the world live in different <b>countries</b> and speak different <b>languages</b>.<br>'
  + '<span class="ex"><b>Singapore</b> → the people are <b>Singaporeans</b>.</span>'
  + '<span class="ex"><b>Malaysia</b> → the people are <b>Malaysians</b>.</span>');
html += WS.section('Fill in the blanks', cfg.people, gPeople);

html += WS.teach('Which country?',
  'Sometimes we are told what the people are called, or which language they speak — and we must name the <b>country</b>.<br>'
  + '<span class="ex">Speaks <b>Hindi</b> → <b>India</b>.</span>');
html += WS.section('Choose the country', cfg.country, gCountry);

html += WS.teach('Circle and underline',
  'Read each sentence. <b>Circle</b> the country. <u>Underline</u> the language the friend speaks.<br>'
  + '<span class="ex">Ella is from <b>(France)</b>. She speaks <u>French</u> and <u>English</u>.</span>');
html += buildFind(cfg.find);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • country, people and language';

/* ---- wiring (shared engine + this unit's annotation widget) ---- */
wireAnnot();
WS.wireChips();
WS.wirePanel(cfg, ['people','country','find'], {
  mark:  () => WS.mark({ extras: [markFind] }),
  clear: () => WS.clearAll(resetAnnotations),
});
</script>
</body>
</html>
