<!DOCTYPE html>
<html lang="en">
<!-- =====================================================================
     Unit 42 — Completing Sentences (Primary One English, WRITING).
     Built from beginning-sounds.html; matching widget copied byte-identical
     from homes.html (see AGENTS.md). Two sections:
       1. Choose the correct word/phrase to complete the sentence (chip-select one) —
          five workbook word/phrase boxes, 4 sentences each = 20 sentences.
       2. Match to form complete sentences (matching widget) —
          three workbook matching exercises, 5 pairs each = 15 pairs.
     Source: workbook pages 188-195.
     ===================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Completing Sentences — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  .chip.pchip { font-size:15pt; }
  .blankmark { letter-spacing:1px; font-weight:bold; }
  /* matching widget (copied from homes.html, logic byte-identical; widened for full-clause pairs) */
  .match { position:relative; display:flex; justify-content:space-between; gap:36px; max-width:680px; margin:6px 0 10px; }
  .mcol { display:flex; flex-direction:column; gap:16px; z-index:2; }
  .colhead { font-family:Verdana,sans-serif; font-size:10.5pt; font-weight:bold; color:#666; text-align:center; margin-bottom:4px; }
  .mitem { font:inherit; font-size:13.5pt; padding:8px 12px; border:2.5px solid var(--ink); border-radius:12px; background:#fff; cursor:pointer; min-width:150px; max-width:230px; line-height:1.3; text-align:center; }
  .mitem.msel { background:#fde68a; }
  .mitem.mk-correct { border-color:var(--right); background:#bbf7d0; }
  .mitem.mk-incorrect { border-color:var(--wrong); background:#fecaca; }
  .mlines { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
  @media print { .mitem.mk-correct, .mitem.mk-incorrect { background:#fff; border-color:var(--ink); } }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>✍️ Completing Sentences — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Read the sentence, then tap the word or phrase that completes it correctly.">Choose <input type="number" id="f-choose" min="0" max="20"></label>
      <label data-tip="Tap a sentence beginning, then tap the ending that completes it.">Match <input type="number" id="f-match" min="0" max="12"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Tap the word or phrase that completes the sentence; tap a sentence beginning, then tap its ending. Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Completing Sentences</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! ✍️⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";
const SVGNS = 'http://www.w3.org/2000/svg';

/* ---- config: one key per section (URL param + panel field + count + generator) ---- */
const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  choose: WS.clamp(WS.toInt(WS.Q.get('choose'), 4), 0, 20),
  match:  WS.clamp(WS.toInt(WS.Q.get('match'),  5), 0, 12) };

const rng = WS.makeRng(cfg.seed);
const { shuffle } = WS.helpers(rng);

/* ---- Section 1: choose the word/phrase that completes the sentence (chip-select, one answer) ----
   Each item's `opts` are drawn only from its own workbook word/phrase box (never across boxes), so
   distractors always stay thematically faithful to the source page. First opt is always the answer;
   render order is shuffled per question. */
const CHOOSE = [
  // page 188 — word cards: pasta / dark clouds / juicy watermelon / toy trucks
  {s:'Thomas plays with his ___.',                     opts:['toy trucks','pasta','dark clouds'],           a:'toy trucks'},
  {s:'Mrs Goh is cooking ___.',                         opts:['pasta','juicy watermelon','toy trucks'],      a:'pasta'},
  {s:'Look at the ___! It is going to rain.',           opts:['dark clouds','pasta','juicy watermelon'],     a:'dark clouds'},
  {s:'Ann buys a ___ from the fruit stall.',            opts:['juicy watermelon','dark clouds','toy trucks'],a:'juicy watermelon'},
  // page 189 — phrase cards: in the cot / in the park / in the pool / on the field
  {s:'Nina is cycling ___.',                            opts:['in the park','in the cot','on the field'],    a:'in the park'},
  {s:'The children are swimming ___.',                  opts:['in the pool','in the park','in the cot'],     a:'in the pool'},
  {s:'The baby is sleeping ___.',                       opts:['in the cot','in the pool','on the field'],    a:'in the cot'},
  {s:'Fauzi is playing football ___.',                  opts:['on the field','in the pool','in the park'],   a:'on the field'},
  // page 190 — phrase box: loves gardening / is baking a cake / is kind and caring / cycles every evening
  {s:'Our teacher ___.',                                opts:['is kind and caring','loves gardening','is baking a cake'],     a:'is kind and caring'},
  {s:'My grandmother ___.',                             opts:['loves gardening','cycles every evening','is baking a cake'],   a:'loves gardening'},
  {s:'My brother ___.',                                 opts:['cycles every evening','is kind and caring','loves gardening'], a:'cycles every evening'},
  {s:'My aunt ___.',                                    opts:['is baking a cake','is kind and caring','cycles every evening'],a:'is baking a cake'},
  // page 191 — picture-clue phrases: from the library / in the stadium / from the florist / to the park
  {s:'James is cycling ___.',                           opts:['to the park','from the library','in the stadium'],  a:'to the park'},
  {s:'Samantha borrows some books ___.',                opts:['from the library','from the florist','to the park'],a:'from the library'},
  {s:'Peter and his friends play football ___.',        opts:['in the stadium','to the park','from the florist'],  a:'in the stadium'},
  {s:'Mary bought some flowers ___.',                   opts:['from the florist','in the stadium','from the library'],a:'from the florist'},
  // page 192 — words/phrases: throw your rubbish / keep the table clean / flush the toilet / cover your mouth
  {s:'Please ___ when you cough or sneeze.',            opts:['cover your mouth','flush the toilet','throw your rubbish'],  a:'cover your mouth'},
  {s:'Please ___ after use.',                           opts:['flush the toilet','cover your mouth','keep the table clean'],a:'flush the toilet'},
  {s:'Please ___ into the bins. Do not litter.',        opts:['throw your rubbish','keep the table clean','flush the toilet'],a:'throw your rubbish'},
  {s:'Let\'s ___ for the next diner when eating out.',  opts:['keep the table clean','throw your rubbish','cover your mouth'],a:'keep the table clean'},
];
const chooseOrder = shuffle(CHOOSE);
function gChoose(i){
  const t = chooseOrder[(i-1) % chooseOrder.length];
  const opts = shuffle(t.opts.slice());
  const chips = opts.map(o => '<button type="button" class="chip pchip" data-ok="'+(o===t.a?1:0)+'">'+o+'</button>').join('');
  const sentence = t.s.replace('___', '<span class="blankmark">___</span>');
  return '<div class="item"><span class="label">'+i+'.</span> '+sentence
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 2: matching widget (reusable — copied from homes.html; see AGENTS.md) ----
   PAIRS: {v: sentence beginning, p: sentence ending}. Every `p` is unique across the whole pool,
   so any subset drawn for a render stays unambiguous. Pool combines all three workbook matching
   exercises (pages 193-195) into one flat list. */
const PAIRS = [
  // page 193 — Colin's puppy / Luke / Claire / the rabbit / the lion
  {v:'Colin\'s puppy',           p:'wags its tail happily.'},
  {v:'Luke',                     p:'broke his toy car.'},
  {v:'Claire',                   p:'washed her hair last night.'},
  {v:'The rabbit',               p:'nibbles on the lettuce.'},
  {v:'The lion',                 p:'roared loudly.'},
  // page 194 — the rainbow / the book / the snake / the cake / the flowers
  {v:'The rainbow',              p:'is colourful!'},
  {v:'The book',                 p:'is old and dusty.'},
  {v:'The snake',                p:'is long and scaly.'},
  {v:'The cake',                 p:'is delicious!'},
  {v:'The flowers',              p:'are sweet smelling.'},
  // page 195 — the policeman / the postman / the bus driver / the nurse / the baker
  {v:'The policeman keeps',      p:'our neighbourhood safe.'},
  {v:'The postman delivers',     p:'letters to our homes.'},
  {v:'The bus driver drives',    p:'the children to school.'},
  {v:'The nurse looks after',    p:'the sick in the hospital.'},
  {v:'The baker bakes',          p:'fresh bread to sell.'},
];
const MATCH_HEADS = ['Beginning', 'Ending'];
function buildMatch(count){
  if (count <= 0) return '';
  const chosen = shuffle(PAIRS).slice(0, count);
  const rights = shuffle(chosen.map(c => c.p));
  const leftHtml = chosen.map(c => '<button type="button" class="mitem mleft" data-answer="'+c.p+'">'+c.v+'</button>').join('');
  const rightHtml = rights.map(p => '<button type="button" class="mitem mright" data-val="'+p+'">'+p+'</button>').join('');
  return '<h2>Match to form complete sentences</h2>'
    + '<div id="sec-match" class="match"><svg class="mlines"></svg>'
    + '<div class="mcol"><div class="colhead">'+MATCH_HEADS[0]+'</div>'+leftHtml+'</div>'
    + '<div class="mcol"><div class="colhead">'+MATCH_HEADS[1]+'</div>'+rightHtml+'</div></div>';
}
function lineColor(l){ return l.classList.contains('mk-correct') ? 'var(--right)' : l.classList.contains('mk-incorrect') ? 'var(--wrong)' : 'var(--accent)'; }
function drawMatch(m){
  const svg = m.querySelector('.mlines'); svg.innerHTML = '';
  const box = m.getBoundingClientRect();
  m.querySelectorAll('.mleft').forEach(l => {
    if (!l.dataset.conn) return;
    const r = [...m.querySelectorAll('.mright')].find(e => e.dataset.val === l.dataset.conn);
    if (!r) return;
    const lr = l.getBoundingClientRect(), rr = r.getBoundingClientRect();
    const line = document.createElementNS(SVGNS, 'line');
    line.setAttribute('x1', lr.right - box.left); line.setAttribute('y1', lr.top + lr.height/2 - box.top);
    line.setAttribute('x2', rr.left - box.left);  line.setAttribute('y2', rr.top + rr.height/2 - box.top);
    line.setAttribute('stroke', lineColor(l)); line.setAttribute('stroke-width', '4'); line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  });
}
function wireMatch(){
  document.querySelectorAll('.match').forEach(m => {
    let sel = null;
    m.querySelectorAll('.mleft').forEach(l => l.addEventListener('click', () => {
      m.querySelectorAll('.mleft').forEach(x => x.classList.remove('msel')); sel = l; l.classList.add('msel');
    }));
    m.querySelectorAll('.mright').forEach(r => r.addEventListener('click', () => {
      if (!sel) return;
      sel.dataset.conn = r.dataset.val; sel.classList.remove('msel','mk-correct','mk-incorrect'); r.classList.remove('mk-correct','mk-incorrect');
      sel = null; drawMatch(m);
    }));
  });
  window.addEventListener('resize', () => document.querySelectorAll('.match').forEach(drawMatch));
}
function resetMatch(){
  document.querySelectorAll('.match .mleft').forEach(l => { delete l.dataset.conn; l.classList.remove('msel','mk-correct','mk-incorrect'); });
  document.querySelectorAll('.match .mright').forEach(r => r.classList.remove('mk-correct','mk-incorrect'));
  document.querySelectorAll('.match .mlines').forEach(s => s.innerHTML = '');
}
function markMatch(){ let total = 0, right = 0;
  document.querySelectorAll('#sec-match').forEach(m => {
    m.querySelectorAll('.mleft').forEach(l => { total++;
      const ok = l.dataset.conn === l.dataset.answer;
      l.classList.remove('mk-correct','mk-incorrect'); l.classList.add(ok ? 'mk-correct' : 'mk-incorrect');
      const r = [...m.querySelectorAll('.mright')].find(e => e.dataset.val === l.dataset.conn);
      if (r) { r.classList.remove('mk-correct','mk-incorrect'); r.classList.add(ok ? 'mk-correct' : 'mk-incorrect'); }
      if (ok) right++;
    });
    drawMatch(m);
  });
  return { total, right };
}
window.__wsAutoSolve = function(){
  document.querySelectorAll('.match .mleft').forEach(l => { l.dataset.conn = l.dataset.answer; });
  document.querySelectorAll('.match').forEach(drawMatch);
};

/* ---- build the sheet: teach, then practise (page order follows the workbook: choose, then match) ---- */
let html = '';
html += WS.teach('Completing sentences',
  'Read the sentence. Look at the words or phrases, then choose the one that completes it correctly.<br>'
  + '<span class="ex"><b>Thomas plays with his ___.</b> → <b>toy trucks</b></span>');
html += WS.section('Choose the correct word or phrase', cfg.choose, gChoose);

html += WS.teach('Matching sentences',
  'A sentence has a beginning and an ending. Tap the beginning, then tap the ending that matches it.<br>'
  + '<span class="ex"><b>Colin\'s puppy</b> → <b>wags its tail happily.</b></span>');
html += buildMatch(cfg.match);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • completing sentences';

/* ---- wiring ---- */
wireMatch();
WS.wireChips();
WS.wirePanel(cfg, ['choose','match'], {
  mark:  () => WS.mark({ extras: [markMatch] }),
  clear: () => WS.clearAll(resetMatch),
});
</script>
</body>
</html>
