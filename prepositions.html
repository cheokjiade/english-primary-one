<!DOCTYPE html>
<html lang="en">
<!-- =====================================================================
     Prepositions. Primary One English.
     Built from adjectives.html; see specs/prepositions.md.
     Sections: in, on or at? (chip) · where is it? (chip) ·
     read and draw the missing item (PRINT-ONLY, parent-graded — see AGENTS.md).
     ===================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prepositions — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  .chip.vchip { font-size:16pt; min-width:60px; }
  .blankmark { letter-spacing:1px; font-weight:bold; }
  /* print-only (parent-graded) helpers */
  .drawbox { height:96px; border:2px dashed #b0b6bd; border-radius:8px; margin:8px 0 4px; }
  .writeline { border-bottom:2px solid var(--ink); height:34px; margin:8px 0; }
  .pbadge { font-family:Verdana,sans-serif; font-size:9pt; font-weight:bold; color:#8a5a00; background:#fff3cd; border:1px solid #ffe08a; border-radius:10px; padding:1px 8px; margin-left:6px; }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>📍 Prepositions — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Tap the preposition that tells us when — in, on or at.">Time <input type="number" id="f-time" min="0" max="12"></label>
      <label data-tip="Tap the preposition that tells us where something is.">Place <input type="number" id="f-place" min="0" max="8"></label>
      <label data-tip="Print-only: the child draws each picture and a grown-up marks it.">Draw ✍️ <input type="number" id="f-draw" min="0" max="6"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Choose the preposition that fits each sentence. The last section is done on the printout (a grown-up marks it). Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Prepositions</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! 📍⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";

const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  time:  WS.clamp(WS.toInt(WS.Q.get('time'),  4), 0, 12),
  place: WS.clamp(WS.toInt(WS.Q.get('place'), 4), 0, 8),
  draw:  WS.clamp(WS.toInt(WS.Q.get('draw'),  3), 0, 6) };

const rng = WS.makeRng(cfg.seed);
const { shuffle } = WS.helpers(rng);

/* ---- Section 1: in, on or at? (chip-select, per-item options) ---- */
const FIND = [
  {s:"I wake up ___ 7 o'clock.", opts:['at','in','on'], a:'at'},
  {s:'My birthday is ___ May.', opts:['in','on','at'], a:'in'},
  {s:'We rest ___ Sunday.', opts:['on','in','at'], a:'on'},
  {s:'School starts ___ the morning.', opts:['in','on','at'], a:'in'},
  {s:"The party is ___ 3 o'clock.", opts:['at','in','on'], a:'at'},
  {s:"We visit grandma ___ New Year's Day.", opts:['on','in','at'], a:'on'},
  {s:'It is cold ___ December.', opts:['in','on','at'], a:'in'},
  {s:'The bus comes ___ noon.', opts:['at','in','on'], a:'at'},
  {s:'I sleep ___ night.', opts:['at','in','on'], a:'at'},
  {s:'We swim ___ the afternoon.', opts:['in','on','at'], a:'in'},
  {s:'The show is ___ Friday.', opts:['on','in','at'], a:'on'},
  {s:'Flowers bloom ___ spring.', opts:['in','on','at'], a:'in'},
];
const findOrder = shuffle(FIND);
function gFind(i){
  const t = findOrder[(i-1) % findOrder.length];
  const opts = shuffle(t.opts.slice());
  const chips = opts.map(o => '<button type="button" class="chip vchip" data-ok="'+(o===t.a?1:0)+'">'+o+'</button>').join('');
  const sentence = t.s.replace('___', '<span class="blankmark">___</span>');
  return '<div class="item"><span class="label">'+i+'.</span> '+sentence
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 2: where is it? (chip-select, per-item options) ---- */
const FIT = [
  {s:'The fish swim ___ the pond.', opts:['in','on','under'], a:'in'},
  {s:'The cup is ___ the table.', opts:['on','in','under'], a:'on'},
  {s:'Fish live ___ the sea.', opts:['in','on','above'], a:'in'},
  {s:'The picture hangs ___ the wall.', opts:['on','in','under'], a:'on'},
  {s:'The toys are ___ the box.', opts:['in','on','beside'], a:'in'},
  {s:'The rug lies ___ the floor.', opts:['on','in','above'], a:'on'},
  {s:'The bird sits ___ the branch.', opts:['on','under','in'], a:'on'},
  {s:'Clothes are kept ___ the cupboard.', opts:['in','on','above'], a:'in'},
];
const fitOrder = shuffle(FIT);
function gFit(i){
  const t = fitOrder[(i-1) % fitOrder.length];
  const opts = shuffle(t.opts.slice());
  const chips = opts.map(o => '<button type="button" class="chip vchip" data-ok="'+(o===t.a?1:0)+'">'+o+'</button>').join('');
  const sentence = t.s.replace('___', '<span class="blankmark">___</span>');
  return '<div class="item"><span class="label">'+i+'.</span> '+sentence
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 3: read and draw the missing item (PRINT-ONLY, parent-graded — no gradable markup) ---- */
const DRAW = ['a ball in the basket','a cup on the table','a cat under the chair','a bird above the tree','a book beside the lamp','a box between two boys'];
const drawOrder = shuffle(DRAW);
function gDraw(i){
  const t = drawOrder[(i-1) % drawOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span> Draw <b>'+t+'</b>.'
    + '<div class="drawbox"></div></div>';
}

/* ---- build the sheet ---- */
let html = '';
html += WS.teach('Prepositions',
  'A <b>preposition</b> tells us <b>when</b> (in, on, at) or <b>where</b> (in, on, under, above, beside, between) something is.<br>'
  + 'We use <b>at</b> for a time, <b>on</b> for a day or date, and <b>in</b> for a month or a longer time.');
html += WS.section('in, on or at?', cfg.time, gFind);
html += WS.section('Where is it?', cfg.place, gFit);
html += WS.teach('On paper ✍️', 'Do this last part on the printed sheet — a grown-up marks it.');
html += WS.section('Read and draw the missing item', cfg.draw, gDraw);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • prepositions';

/* ---- wiring ---- */
WS.wireChips();
WS.wirePanel(cfg, ['time','place','draw'], {
  mark:  () => WS.mark(),
  clear: () => WS.clearAll(),
});
</script>
</body>
</html>
