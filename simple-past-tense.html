<!DOCTYPE html>
<html lang="en">
<!-- =====================================================================
     Unit 12 — Simple Past Tense. Primary One English.
     Built from beginning-sounds.html; see specs/simple-past-tense.md.
     Introduces the reusable MATCHING widget (tap-to-connect, SVG lines,
     custom marker + window.__wsAutoSolve hook) — reused by the vocab units.
     Two sections: match verb -> past (matching) · choose the past tense (chip).
     ===================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simple Past Tense — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  .chip.vchip { font-size:16pt; min-width:60px; }
  .blankmark { letter-spacing:1px; font-weight:bold; }
  /* matching widget */
  .match { position:relative; display:flex; justify-content:space-between; gap:90px; max-width:560px; margin:6px 0 10px; }
  .mcol { display:flex; flex-direction:column; gap:16px; z-index:2; }
  .colhead { font-family:Verdana,sans-serif; font-size:10.5pt; font-weight:bold; color:#666; text-align:center; margin-bottom:4px; }
  .mitem { font:inherit; font-size:15pt; padding:8px 14px; border:2.5px solid var(--ink); border-radius:12px; background:#fff; cursor:pointer; min-width:112px; text-align:center; }
  .mitem.msel { background:#fde68a; }
  .mitem.mk-correct { border-color:var(--right); background:#bbf7d0; }
  .mitem.mk-incorrect { border-color:var(--wrong); background:#fecaca; }
  .mlines { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
  @media print { .mitem.mk-correct, .mitem.mk-incorrect { background:#fff; border-color:var(--ink); } }
  .writeline { border-bottom:2px solid var(--ink); height:34px; margin:8px 0; }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>⏪ Simple Past Tense — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Tap a verb, then tap its past tense to join them.">Match <input type="number" id="f-match" min="0" max="6"></label>
      <label data-tip="Tap the past-tense verb (the sentence says it already happened).">Choose past <input type="number" id="f-past" min="0" max="10"></label>
      <label data-tip="Print-only: the child writes an answer and a grown-up marks it.">Answer ✍️ <input type="number" id="f-answer" min="0" max="8"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Tap a verb then its past tense to join them; tap a past-tense chip. The past tense tells what already happened (often with -ed). Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Simple Past Tense</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! ⏪⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";
const SVGNS = 'http://www.w3.org/2000/svg';

const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  match: WS.clamp(WS.toInt(WS.Q.get('match'), 5), 0, 6),
  past:  WS.clamp(WS.toInt(WS.Q.get('past'),  4), 0, 10),
  answer: WS.clamp(WS.toInt(WS.Q.get('answer'), 4), 0, 8) };

const rng = WS.makeRng(cfg.seed);
const { shuffle } = WS.helpers(rng);

/* ---- Section 1: match each verb to its past tense (MATCHING widget) ---- */
const PAIRS = [
  {v:'walk',p:'walked'},{v:'jump',p:'jumped'},{v:'play',p:'played'},{v:'climb',p:'climbed'},
  {v:'skip',p:'skipped'},{v:'cry',p:'cried'},{v:'eat',p:'ate'},{v:'run',p:'ran'},
  {v:'swim',p:'swam'},{v:'write',p:'wrote'},{v:'drink',p:'drank'},{v:'sleep',p:'slept'},
  {v:'take',p:'took'},{v:'go',p:'went'},{v:'buy',p:'bought'},{v:'throw',p:'threw'},
];
function buildMatch(count){
  if (count <= 0) return '';
  const chosen = shuffle(PAIRS).slice(0, count);              // distinct pairs, drawn without replacement
  const rights = shuffle(chosen.map(c => c.p));               // past forms shown shuffled
  const leftHtml = chosen.map(c => '<button type="button" class="mitem mleft" data-answer="'+c.p+'">'+c.v+'</button>').join('');
  const rightHtml = rights.map(p => '<button type="button" class="mitem mright" data-val="'+p+'">'+p+'</button>').join('');
  return '<h2>Match each verb to its past tense</h2>'
    + '<div id="sec-match" class="match"><svg class="mlines"></svg>'
    + '<div class="mcol"><div class="colhead">Now</div>'+leftHtml+'</div>'
    + '<div class="mcol"><div class="colhead">In the past</div>'+rightHtml+'</div></div>';
}
function lineColor(l){ return l.classList.contains('mk-correct') ? 'var(--right)' : l.classList.contains('mk-incorrect') ? 'var(--wrong)' : 'var(--accent)'; }
function drawMatch(m){
  const svg = m.querySelector('.mlines'); svg.innerHTML = '';
  const box = m.getBoundingClientRect();
  m.querySelectorAll('.mleft').forEach(l => {
    if (!l.dataset.conn) return;
    const r = [...m.querySelectorAll('.mright')].find(e => e.dataset.val === l.dataset.conn);
    if (!r) return;
    const lr = l.getBoundingClientRect(), rr = r.getBoundingClientRect();
    const line = document.createElementNS(SVGNS, 'line');
    line.setAttribute('x1', lr.right - box.left); line.setAttribute('y1', lr.top + lr.height/2 - box.top);
    line.setAttribute('x2', rr.left - box.left);  line.setAttribute('y2', rr.top + rr.height/2 - box.top);
    line.setAttribute('stroke', lineColor(l)); line.setAttribute('stroke-width', '4'); line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  });
}
function wireMatch(){
  document.querySelectorAll('.match').forEach(m => {
    let sel = null;
    m.querySelectorAll('.mleft').forEach(l => l.addEventListener('click', () => {
      m.querySelectorAll('.mleft').forEach(x => x.classList.remove('msel')); sel = l; l.classList.add('msel');
    }));
    m.querySelectorAll('.mright').forEach(r => r.addEventListener('click', () => {
      if (!sel) return;
      sel.dataset.conn = r.dataset.val; sel.classList.remove('msel','mk-correct','mk-incorrect'); r.classList.remove('mk-correct','mk-incorrect');
      sel = null; drawMatch(m);
    }));
  });
  window.addEventListener('resize', () => document.querySelectorAll('.match').forEach(drawMatch));
}
function resetMatch(){
  document.querySelectorAll('.match .mleft').forEach(l => { delete l.dataset.conn; l.classList.remove('msel','mk-correct','mk-incorrect'); });
  document.querySelectorAll('.match .mright').forEach(r => r.classList.remove('mk-correct','mk-incorrect'));
  document.querySelectorAll('.match .mlines').forEach(s => s.innerHTML = '');
}
function markMatch(){ let total = 0, right = 0;
  document.querySelectorAll('#sec-match').forEach(m => {
    m.querySelectorAll('.mleft').forEach(l => { total++;
      const ok = l.dataset.conn === l.dataset.answer;
      l.classList.remove('mk-correct','mk-incorrect'); l.classList.add(ok ? 'mk-correct' : 'mk-incorrect');
      const r = [...m.querySelectorAll('.mright')].find(e => e.dataset.val === l.dataset.conn);
      if (r) { r.classList.remove('mk-correct','mk-incorrect'); r.classList.add(ok ? 'mk-correct' : 'mk-incorrect'); }
      if (ok) right++;
    });
    drawMatch(m);
  });
  return { total, right };
}
/* verifier hook: auto-connect each verb to its correct past tense */
window.__wsAutoSolve = function(){
  document.querySelectorAll('.match .mleft').forEach(l => { l.dataset.conn = l.dataset.answer; });
  document.querySelectorAll('.match').forEach(drawMatch);
};

/* ---- Section 2: choose the past tense (chip-select, one answer) ---- */
const PAST = [
  {s:'She ___ to the library last week.',   now:'goes',    past:'went'},
  {s:'He ___ his homework yesterday.',       now:'finishes', past:'finished'},
  {s:'They ___ chess just now.',             now:'play',    past:'played'},
  {s:'I ___ a bus to school this morning.',  now:'take',    past:'took'},
  {s:'The kitten ___ its food last night.',  now:'eats',    past:'ate'},
  {s:'We ___ to the park yesterday.',        now:'cycle',   past:'cycled'},
  {s:'Sophia ___ a picture last Sunday.',    now:'draws',   past:'drew'},
  {s:'My father ___ with us yesterday.',     now:'jogs',    past:'jogged'},
  {s:'Alice ___ just now.',                  now:'cries',   past:'cried'},
  {s:'The children ___ some milk just now.', now:'drink',   past:'drank'},
  {s:'Mary ___ to school yesterday.',        now:'walks',   past:'walked'},
  {s:'Mr Kumar ___ a camera last year.',     now:'buys',    past:'bought'},
];
const pastOrder = shuffle(PAST);
function gPast(i){
  const t = pastOrder[(i-1) % pastOrder.length];
  const opts = shuffle([t.now, t.past]);
  const chips = opts.map(o => '<button type="button" class="chip vchip" data-ok="'+(o===t.past?1:0)+'">'+o+'</button>').join('');
  const sentence = t.s.replace('___', '<span class="blankmark">___</span>');
  return '<div class="item"><span class="label">'+i+'.</span> '+sentence
    + '<div class="sel-block" data-mode="one"><div class="chips">'+chips+'</div></div></div>';
}

/* ---- Section 3: answer the question (PRINT-ONLY, parent-graded — no gradable markup) ---- */
const PANS = [
  {q:'What did you have for breakfast?', h:'had'}, {q:'What did you drink just now?', h:'drank'},
  {q:'Where did you go yesterday?', h:'went'},     {q:'What did you buy just now?', h:'bought'},
  {q:'When did you sleep last night?', h:'slept'}, {q:'Why did you cry?', h:'cried'},
  {q:'What did you eat for lunch?', h:'ate'},      {q:'Who did you see at the park?', h:'saw'},
];
const pansOrder = shuffle(PANS);
function gAnswer(i){
  const t = pansOrder[(i-1) % pansOrder.length];
  return '<div class="item"><span class="label">'+i+'.</span> Answer in a full sentence: <b>'+t.q+'</b> <i>(use "'+t.h+'")</i>'
    + '<div class="writeline"></div></div>';
}

/* ---- build the sheet ---- */
let html = '';
html += WS.teach('Simple past tense',
  'The simple past tense shows something that <b>already happened</b>.<br>'
  + 'Many verbs add <b>-ed</b>: <i>walk → walked</i>. Some change completely: <i>eat → ate, go → went</i>.');
html += buildMatch(cfg.match);
html += WS.section('Choose the past tense', cfg.past, gPast);
html += WS.teach('On paper ✍️', 'Answer these on the printed sheet — a grown-up marks them.');
html += WS.section('Answer the question', cfg.answer, gAnswer);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • simple past tense';

/* ---- wiring ---- */
wireMatch();
WS.wireChips();
WS.wirePanel(cfg, ['match','past','answer'], {
  mark:  () => WS.mark({ extras: [markMatch] }),
  clear: () => WS.clearAll(resetMatch),
});
</script>
</body>
</html>
