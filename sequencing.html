<!DOCTYPE html>
<html lang="en">
<!-- =====================================================================
     Unit 34 — Sequencing. Primary One English.
     Built from beginning-sounds.html; see specs/sequencing.md.
     Source: workbook pages 144-146 ("Arrange the pictures in the correct
     sequence" + "First/Next/Then/Last" picture stories). Adapted from
     PICTURES to short TEXT steps (see specs/sequencing.md).
     Sections: put the steps of a story in order (drag/tap-to-order) ·
     what happens first or last (chip-select one).
     ===================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sequencing — Primary One English</title>
<link rel="stylesheet" href="assets/worksheet.css">
<link rel="icon" type="image/svg+xml" href="assets/twemoji/1f4d5.svg">
<style>
  /* sequencing-specific components (topic style stays in the page; shared style is in worksheet.css) */
  .storycap { display:block; font-size:15pt; margin:4px 0 10px; }

  /* .seq: a vertical layout for the drag-order widget, needed because our tiles are whole
     sentences (not single words like the golden template's gSentence), so the default
     horizontal row of small pill-tiles would overflow. Higher specificity than the plain
     .dtile/.dslot/.dsource/.dslots rules in worksheet.css, so these safely win without editing it. */
  .seq .dsource { flex-direction:column; align-items:stretch; }
  .seq .dtile   { width:100%; box-sizing:border-box; height:auto; min-height:40px; padding:9px 14px;
                   white-space:normal; line-height:1.35; text-align:left; justify-content:flex-start; }
  .seq .dslots  { flex-direction:column; align-items:stretch; gap:16px; }
  .slotrow      { display:flex; align-items:center; gap:10px; }
  .slotrow .ord { font-family:Verdana,sans-serif; font-weight:bold; font-size:11pt; color:#555; width:40px; flex:none; text-align:right; }
  .seq .dslot   { display:flex; width:100%; box-sizing:border-box; height:auto; min-height:40px; padding:7px 12px;
                   justify-content:flex-start; text-align:left; }

  /* chip-select one, but the chip text is a whole sentence -> stack the chips instead of a row */
  .stepchips     { flex-direction:column; align-items:stretch; }
  .chip.stepchip { font-size:14pt; text-align:left; white-space:normal; line-height:1.3; max-width:100%; }
</style>
</head>
<body>
<details class="panel no-print" id="ws-panel" open>
  <summary>🎞️ Sequencing — options</summary>
  <div class="panel-body">
    <div class="backlink"><a href="index.html">&larr; All worksheets</a></div>
    <div class="fields">
      <label data-tip="A word or number. The same seed always makes the same sheet; leave blank for a random one.">Seed <input type="text" id="f-seed" placeholder="random"></label>
      <label data-tip="Put the steps of a short story in the correct order — drag or tap each step into its box.">Put in order <input type="number" id="f-order" min="0" max="10"></label>
      <label data-tip="Read the steps of a story and tap the one that happens first or last.">First or last? <input type="number" id="f-first" min="0" max="10"></label>
    </div>
    <div class="btns">
      <button class="go" id="b-apply">Generate</button>
      <button id="b-random">🎲 Random seed</button>
      <button class="primary" id="b-submit">✅ Submit &amp; Mark</button>
      <button id="b-reset">Clear answers</button>
      <button id="b-print">🖨️ Print</button>
    </div>
    <div class="hint">Drag or tap the steps into order (1st, 2nd, 3rd…); tap the step that happens first or last. Same seed + settings = same worksheet.</div>
  </div>
</details>
<div class="score" id="score"></div>
<h1>Sequencing</h1>
<div class="meta-line" id="meta"></div>
<div class="name-row"><div>Name: <span></span></div><div>Date: <span></span></div></div>
<div id="sheet"></div>
<div class="footer">Great work! 🎞️⭐</div>

<script src="assets/worksheet.js"></script>
<script>
"use strict";

/* ---- config: one key per section, each maps 1:1 to a URL param + panel field + generator ---- */
const cfg = { seed: WS.Q.get('seed') || WS.randomSeed(),
  order: WS.clamp(WS.toInt(WS.Q.get('order'), 5), 0, 10),
  first: WS.clamp(WS.toInt(WS.Q.get('first'), 4), 0, 10) };

const rng = WS.makeRng(cfg.seed);
const { shuffle, balanced } = WS.helpers(rng);

/* ---- story pool: pictures -> short text steps (see specs/sequencing.md for the workbook mapping).
   Each story's `steps` are written in the CORRECT order and deliberately avoid the words
   "first/next/then/last/1st/2nd…" inside the step text itself — those cue words are only ever
   shown as the SLOT labels, never as part of a shuffled tile/chip, so the child has to reason
   about the story (what must happen before what), not pattern-match a keyword. 7 stories have
   3 steps, 3 have 4 steps — 9 are adapted from the workbook (pages 144-146), 1 ("Brushing Teeth")
   is an original story in the same everyday-routine style. ---- */
const STORIES = [
  { emoji:'🐔', title:"A Hen's Eggs", steps:[
    'A hen lays her eggs in a nest.',
    'The eggs hatch into fluffy chicks.',
    'The hen feeds her chicks.' ] },
  { emoji:'🏊', title:'Swimming Time', steps:[
    'A boy puts on his swimsuit.',
    'He swims and plays in the pool.',
    'He dries himself with a towel.' ] },
  { emoji:'🍌', title:'The Banana Peel', steps:[
    'A man eats a banana and drops the peel.',
    'He steps on the peel and slips.',
    'He falls down and hurts himself.' ] },
  { emoji:'🚌', title:'Going to School', steps:[
    'A boy waits at the bus stop.',
    'He gets on the bus.',
    'He rides the bus to school.' ] },
  { emoji:'🌱', title:'Growing a Plant', steps:[
    'A boy plants a seed in a pot.',
    'He waters the seed every day.',
    'The seed grows into a tall plant.' ] },
  { emoji:'🏁', title:'Sports Day', steps:[
    'A boy gets ready at the start line.',
    'He runs as fast as he can.',
    'He wins the race.' ] },
  { emoji:'🦷', title:'Brushing Teeth', steps:[
    'Put toothpaste on the toothbrush.',
    'Brush every tooth well.',
    'Rinse your mouth with water.' ] },
  { emoji:'⛄', title:'Building a Snowman', steps:[
    'Roll a big ball of snow for the bottom.',
    'Stack a medium ball of snow on top.',
    'Stack a small ball of snow on top for the head.',
    'Add a hat, a face and arms.' ] },
  { emoji:'🎂', title:'The Birthday Cake', steps:[
    'Bake a birthday cake.',
    'Decorate the cake with candles.',
    'Blow out the candles.',
    'Cut the cake and eat a slice.' ] },
  { emoji:'🌙', title:'Bedtime', steps:[
    'Put on your pyjamas.',
    'Read a bedtime story.',
    'Lie down and close your eyes.',
    'Fall fast asleep.' ] },
];
const ORD = ['1st','2nd','3rd','4th'];

/* ---- Section 1: put the steps in order (drag / tap-to-order) ---- */
/* Distinct STORY per question (shuffled pool indexed by question number, like gSentence in the
   golden template) guarantees no two questions in this section are the same story. Tile values are
   POSITIONS (1..n), matching the slot that wants that position — see AGENTS.md / conventions.md. */
const orderPool = shuffle(STORIES);
let oid = 0;
function gOrder(i){
  const story = orderPool[(i-1) % orderPool.length];
  const steps = story.steps;
  const id = 'o' + (oid++);
  const tiles = shuffle(steps.map((s, k) => ({ s, v: String(k+1) })));
  const src   = tiles.map(t => '<div class="dtile" data-val="'+t.v+'">'+t.s+'</div>').join('');
  const slots = steps.map((s, k) => '<div class="slotrow"><span class="ord">'+ORD[k]+'</span><div class="dslot" data-answer="'+(k+1)+'"></div></div>').join('');
  return '<div class="item"><span class="label">'+i+'.</span> <span class="storycap">'+story.emoji+' <b>'+story.title+'</b></span>Put the steps of the story in the correct order.'
    + '<div class="dorder seq" id="'+id+'">'
    + '<div class="dsource">'+src+'</div>'
    + '<div class="dslots">'+slots+'</div>'
    + '</div></div>';
}

/* ---- Section 2: what happens first or last? (chip-select, one answer) ---- */
/* Distinct STORY per question (its own independently-shuffled pool) guarantees distinctness the same
   way as section 1 — a different story means different chip wording, regardless of the first/last
   balance. `balanced` just spreads the FIRST/LAST phrasing evenly instead of an independent coin-flip
   per question. Three step-chips per question: the correct (first or last) step + 2 distractors drawn
   from the story's remaining steps — this is also what makes dorder's auto-complete-in-probe harmless:
   this chip block is what the verifier's probe (skip the first correct chip) actually drops a mark on. */
const firstPool = shuffle(STORIES);
const askPos = balanced(['first', 'last']);
function gFirst(i){
  const story = firstPool[(i-1) % firstPool.length];
  const steps = story.steps;
  const pos = askPos(i);
  const targetIdx = pos === 'first' ? 0 : steps.length - 1;
  const restIdx = shuffle(steps.map((_, k) => k).filter(k => k !== targetIdx)).slice(0, 2);
  const opts = shuffle([{ t: steps[targetIdx], ok: true }, ...restIdx.map(k => ({ t: steps[k], ok: false }))]);
  const chips = opts.map(o => '<button type="button" class="chip stepchip" data-ok="'+(o.ok?1:0)+'">'+o.t+'</button>').join('');
  return '<div class="item"><span class="label">'+i+'.</span> <span class="storycap">'+story.emoji+' <b>'+story.title+'</b></span>Which step happens <b>'+pos.toUpperCase()+'</b>? (tap it)'
    + '<div class="sel-block" data-mode="one"><div class="chips stepchips">'+chips+'</div></div></div>';
}

/* ---- build the sheet: teach, then practise (each teach block is ignored by marking + verifier) ---- */
let html = '';
html += WS.teach('Sequencing',
  'Things in a story happen in a certain <b>order</b>. We can show the order with numbers '
  + '(<b>1st, 2nd, 3rd…</b>) or with the words <b>First, Next, Then, Last</b>.<br>'
  + '<span class="ex"><b>1st:</b> Wake up. <b>2nd:</b> Get dressed. <b>3rd:</b> Eat breakfast.</span>');
html += WS.section('Put the steps in order', cfg.order, gOrder);

html += WS.teach('First and last',
  'The <b>first</b> step happens before all the others. The <b>last</b> step happens right at the end.<br>'
  + '<span class="ex">Get up &rarr; Get dressed &rarr; Eat breakfast — <b>getting up</b> is FIRST, <b>eating breakfast</b> is LAST.</span>');
html += WS.section('What happens first or last?', cfg.first, gFirst);

document.getElementById('sheet').innerHTML = html;
document.getElementById('meta').textContent = 'seed: ' + cfg.seed + '  •  Primary One English • sequencing';

/* ---- wiring (shared engine) ---- */
WS.wireChips();          // tappable chips (radio for data-mode="one")
WS.enableDragOrder();    // drag / tap-to-place tiles
WS.wirePanel(cfg, ['order','first'], {
  mark:  () => WS.mark(),
  clear: () => WS.clearAll(),
});
</script>
</body>
</html>
